server:
  port: 8001

spring:
  datasource:
    # ShardingSphere 对 Driver 自定义，实现分库分表等隐藏逻辑
    driver-class-name: org.apache.shardingsphere.driver.ShardingSphereDriver
    # ShardingSphere 配置文件路径
    url: jdbc:shardingsphere:classpath:shardingsphere-config.yaml
  data:
    redis:
      cluster:
        nodes:
          - 192.168.211.130:7001
          - 192.168.211.130:7002
          - 192.168.211.130:7003
          - 192.168.211.130:8001
          - 192.168.211.130:8002
          - 192.168.211.130:8003
  mvc:
    view:
      prefix: /templates/
      suffix: .html

short-link:
  stats:
    locale:
      amap-key: 039f1380a66e619f00b38045e4b78550

rocketmq:
  name-server: 192.168.211.130:9876
  producer:
    group: short-link_project-service_stats-save_pg
    topic: short-link_project-service_topic
    send-message-timeout: 2000
    retry-times-when-send-failed: 1
    retry-times-when-send-async-failed: 1
  consumer:
    group: short-link_project-service_stats-save_cg